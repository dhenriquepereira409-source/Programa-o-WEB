<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>

    <h1>TIPOS DE INPUT PARA FORMULÁRIO</h1><br>
    <fieldset>
        <legend>Dados de Login</legend>
        <input type="text" name="entradatexto" id="entradatexto" placeholder="insira um texto"><br><br>
        <input type="password" name="senha" id="senha" placeholder="digite sua senha"><br><br>
        <input type="button" value="clique aqui"><br>
    </fieldset><br><br>

    <input type="checkbox" id="cor1" name="cor1" value="Branco">
    <label for="cor1">Branco</label><br>
    <input type="checkbox" id="cor2" name="cor2" value="Azul">
    <label for="cor2">Azul</label><br>
    <input type="checkbox" id="cor3" name="cor3" value="Amarelo">
    <label for="cor3">Amarelo</label><br><br>
    
    <input type="color" name="selector" id="selector">
    <label for="selector">Selecione uma cor</label><br><br>

    <input type="date" name="data" id="data">
    <label for="data">Data</label><br><br>

    <input type="time" name="hora" id="hora">
    <label for="hora">Informe o Horário</label><br><br>

    <input type="email" name="email" id="email" placeholder="Digite seu e-mail"><br><br>
    
    <input type="number" name="numero" id="numero" placeholder="Digite o numero de telefone: "><br><br>

    <input type="file" name="arquivo" id="arquivo" title="Buscar">
    <label for="arquivo">Selecione um arquivo</label><br><br>

    <input type="url" name="url" id="url" placeholder="Insira o Endereço"><br><br>

    <input type="week" name="semana" id="semana">
    <label for="semana">Selecione a semana</label><br><br>

    <input type="month" name="mes" id="mes">
    <label for="mes">Selecione o mês</label><br><br>

    <h4>Selecione a linguagem favorita:</h4>

    <input type="radio" name="select" id="HTML" value="HTML">
    <label for="select">HTML</label><br>
    <input type="radio" name="select" id="CSS" value="CSS">
    <label for="select">CSS</label><br>
    <input type="radio" name="select" id="JAVASCRIPT" value="JAVASCRIPT">
    <label for="select">JAVASCRIPT</label><br><br>

    <label for="volume">Volume</label>
    <input type="range" name="volume" id="volume" min="0" max="100"><br><br>

    <label for="busca">Pesquisa</label>
    <input type="search" id="busca" name="busca"><br><br>

    <label for="fone">Digite seu telefone</label>
    <input type="tel" name="fone" id="fone" pattern="[0-9]{2}-[0-9]{9}" placeholder="00-000000000" required><br><br>

    <label for="reset">Apagar campos</label>
    <input type="reset" name="reset" id="reset" value="limpar"><br><br>
    
    <label for="enviar">Enviar Informações</label>
    <input type="submit" name="enviar" id="enviar" value="Enviar"><br><br>

    <label for="estados">Selecione um Estado:</label>
    <select name="estados" id="estados">
        <option value="BA">BA</option>
        <option value="MG" selected>MG</option>
        <option value="SC">SC</option>
        <option value="MA">MA</option>
    </select><br><br>

    <label for="mensagem">Sua mensagem: </label>
    <textarea name="mensagem" id="mensagem" rows="5" cols="30">Digite sua mensagem</textarea>

    </form>

</body>
</html>

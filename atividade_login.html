<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: rgb(248, 183, 109);
        }
        form{
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 10px rgb(102, 102, 102);
        }
        div{
            margin-bottom: 13px;
            height: 70px;
          
        }
        input{
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button{
            width: 100%;
            padding: 11px;
            background-color: rgb(248, 99, 0);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover{
            background-color: rgb(248, 99, 0);
            transform: scale(1.1);
        }
        h2{
            text-align: center;
            padding: 1px;
        }
    </style>
</head>
<body>
    <form action="">
        <h2>Criar Conta</h2>
        <div>
            <label for="name">Nome do Usuário</label>
            <input type="text" name="name" id="name" placeholder="Digite o nome de usuário..." required>
            
        </div>
        <div>
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email" placeholder="Digite seu e-mail..." required>
        </div>
        <div>
            <label for="senha">Senha</label>
            <input type="password" name="senha" id="senha" placeholder="Digite sua senha..." required>
        </div>
        <div>
            <label for="confirmar_senha">Confirmar Senha</label>
            <input type="password" name="confirmar_senha" id="confirmar_senha" placeholder="Confirme sua senha..." required>
        </div>
        <button type="submit">Entrar</button>
    </form>
</body>
</html>

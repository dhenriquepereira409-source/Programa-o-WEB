<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Tabelas - CSS</title>
	<style>
		table, th, td{
			border: 1px solid black;
			border-collapse: collapse;
			width: 50%;
			text-align: center;
			padding: 8px;

			margin-left: auto;
			margin-right: auto;
			width: 50%;
		}
	</style>
</head>
<body>
	<table>
		<tr>
			<th>Nome</th>
			<th>Valor</th>
			<th>Quantidade</th>
		</tr>
		<tr>
			<td>Balão</td>
			<td>10.00</td>
			<td>50</td>
		</tr>
		<tr>
			<td>Chiclete</td>
			<td>15.00</td>
			<td>15</td>
		</tr>

</body>
</html>
